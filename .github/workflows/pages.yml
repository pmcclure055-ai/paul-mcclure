name: Deploy Portfolio to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout
    uses: actions/checkout@v4

    - name: Validate portfolio files
    run: |
      set -e
      python3 - <<'PY'
      import pathlib
      import re
      import sys

      root = pathlib.Path("Paul-Portfolio")
      if not root.exists():
        print("ERROR: Paul-Portfolio directory not found")
        sys.exit(1)

      html_files = sorted(root.glob("*.html"))
      if not html_files:
        print("ERROR: No HTML files found in Paul-Portfolio")
        sys.exit(1)

      errors = []

      def is_external(link: str) -> bool:
        return (
          link.startswith("http://")
          or link.startswith("https://")
          or link.startswith("mailto:")
          or link.startswith("tel:")
          or link.startswith("#")
        )

      for html in html_files:
        text = html.read_text(encoding="utf-8", errors="ignore")
        rel = html.as_posix()

        if not text.strip():
          errors.append(f"{rel}: file is empty")
          continue

        if "<!doctype html" not in text.lower():
          errors.append(f"{rel}: missing <!DOCTYPE html>")

        if "<title" not in text.lower():
          errors.append(f"{rel}: missing <title>")

        if "style.css" not in text:
          errors.append(f"{rel}: missing stylesheet link to style.css")

        refs = re.findall(r'(?:href|src)=["\']([^"\']+)["\']', text, flags=re.IGNORECASE)
        for ref in refs:
          if is_external(ref):
            continue
          local = ref.split("#", 1)[0].split("?", 1)[0].strip()
          if not local:
            continue
          target = (html.parent / local).resolve()
          if not target.exists():
            errors.append(f"{rel}: broken local reference -> {ref}")

      css_file = root / "style.css"
      if not css_file.exists():
        errors.append("Paul-Portfolio/style.css: file not found")
      elif not css_file.read_text(encoding="utf-8", errors="ignore").strip():
        errors.append("Paul-Portfolio/style.css: file is empty")

      if errors:
        print("Validation failed:")
        for e in errors:
          print(f" - {e}")
        sys.exit(1)

      print("Validation passed.")
      PY

  deploy:
  needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Paul-Portfolio

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4