<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Paul McClure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="shared-header.js" defer></script>
    <script src="theme-toggle.js" defer></script>
    <script src="shared-footer.js" defer></script>
</head>
<body data-active-page="contact">
    <header data-site-header></header>

    <main id="main-content" class="contact-page">
        <div class="contact-container">

            <section class="contact-column-text">
                <h1>Contact Me</h1>
                <div class="contact-details">
                    <p><i class="fa fa-map-marker" aria-hidden="true"></i> Fort Collins, Colorado</p>
                    <p><i class="fa fa-phone" aria-hidden="true"></i> Phone: (970) 501-9404</p>
                    <p><i class="fa fa-envelope" aria-hidden="true"></i> Email: pmcclure055@gmail.com</p>
                </div>

                <p class="form-instruction">Please fill out the form below to get in touch with me, and I will get back to you as soon as possible.</p>

                <form action="https://formsubmit.co/pmcclure055@gmail.com" method="POST">
                    <input type="hidden" name="_subject" value="Portfolio Contact Form Submission">
                    <input type="hidden" name="_template" value="table">
                    <label for="contact-name" class="sr-only">Name</label>
                    <input id="contact-name" name="name" type="text" placeholder="Name" autocomplete="name" required>
                    <label for="contact-email" class="sr-only">Email</label>
                    <input id="contact-email" name="email" type="email" placeholder="Email" autocomplete="email" required>
                    <label for="contact-subject" class="sr-only">Subject</label>
                    <input id="contact-subject" name="subject" type="text" placeholder="Subject" required>
                    <label for="contact-message" class="sr-only">Message</label>
                    <textarea id="contact-message" name="message" placeholder="Message" rows="5" required></textarea>
                    <button type="submit" class="send-btn">
                        <i class="fa fa-paper-plane" aria-hidden="true"></i> SEND MESSAGE
                    </button>
                </form>
                <p class="form-helper">This form is powered by FormSubmit. The first submission may require a quick email verification.</p>
            </section>

            <section class="contact-column-image">
                <img src="paul_contact_photo.jpg" alt="Paul McClure" class="contact-photo">
            </section>
        </div>
    </main>

    <footer data-site-footer></footer>

</body>
</html>
